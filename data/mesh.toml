# cloud-boot mesh visualisation — read by layouts/partials/mesh.html.
#
# Top row : four arch nodes (x86_64, arm64, riscv64, loongarch64).
# Centre  : the multi-arch ISO hub.
# Bottom  : seven OS family nodes (six Linux families + 3 BSDs are
#           sampled here ; Windows is mentioned in the text but not
#           drawn — its DevicePath path doesn't share the EFI
#           binary set).
#
# Spheres are boot envelopes flowing hub → arch → distro, encoding
# "one ISO, many targets".

# ---------- Nodes ----------

# Arches (top row). Labels above.
[[nodes]]
x = 160
y = 130
kind = "arch"
label = "x86_64"
halo_r = 16
core_r = 9
label_y = -26
[[nodes]]
x = 460
y = 110
kind = "arch"
label = "arm64"
halo_r = 16
core_r = 9
label_y = -26
[[nodes]]
x = 760
y = 110
kind = "arch"
label = "riscv64"
halo_r = 16
core_r = 9
label_y = -26
[[nodes]]
x = 1060
y = 130
kind = "arch"
label = "loongarch64"
halo_r = 16
core_r = 9
label_y = -26

# Centre hub : the multi-arch ISO.
[[nodes]]
