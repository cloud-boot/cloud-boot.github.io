locale  = 'en-us'
title   = 'cloud-boot'
# No theme — layouts live in ./layouts

disableKinds = ['taxonomy', 'term', 'rss', 'sitemap']

[params]
  description = "cloud-boot is a UKI toolchain, a TinyGo UEFI loader, and a pure-Go TamaGo bare-metal UEFI loader that boots unmodified Linux, FreeBSD, NetBSD, OpenBSD cloud images (and Windows via DevicePath handoff) on KVM/QEMU, Apple Virtualization.framework, and OpenStack — across amd64, arm64, riscv64, and loongarch64."
  brand       = "cloud-boot"
  github      = "cloud-boot"
  heroAccent  = "cloud-boot"
  heroTagline = "From firmware entry to distro userspace — pure Go, four arches, one ISO."

  heroIntro = [
    "<strong>cloud-boot</strong> boots an unmodified cloud image on any UEFI hypervisor. Two complementary tracks coexist : <em>Phase 1</em> ships a UKI toolchain plus three boot paths (<em>kexec</em>, <em>UKI menu-then-reboot</em>, <em>pure-UEFI TinyGo loader</em>) that all land on the same stock OS userspace ; <em>Phase 2</em> is a pure-Go TamaGo bare-metal UEFI loader that walks PCI, drives virtio-net, speaks DHCPv4 / DNS / TLS / HTTPS / OCI v2, verifies cosign signatures, and chain-boots the distro kernel — entirely inside Boot Services, no cgo, no external linker.",
    "One multi-arch hybrid ISO embeds <code>BOOTX64.EFI</code> + <code>BOOTAA64.EFI</code> + <code>BOOTRISCV64.EFI</code> + <code>BOOTLOONGARCH64.EFI</code> ; firmware on each CPU reads only its own arch's file. <strong>Phase 2 reaches a real Debian 13 userspace on all four arches</strong> from a fresh DHCP lease against a public OCI registry — arm64 <strong>17.1 s</strong>, amd64 <strong>16.1 s</strong>, riscv64 <strong>18.1 s</strong>, loong64 <strong>17.1 s</strong> wall-clock (Debian 6.12.90 across the first three, 7.0.12 on loong64). amd64 closed 2026-06-10 via the <code>R-amd64a..j</code> cleanup chain : an EDK2 <code>CpuPageTableLib</code> upstream fix, a TamaGo cpuinit <code>.bss</code> zero pass plus <code>goos.Bloc</code> <code>MOVQ</code>, an <code>rxLoop</code> alloc-churn fix, a <code>dialTLSOnce</code> deadline-math fix, and finally an OVMF amd64 <code>LoadFile2</code> quirk worked around via the <code>initrd=</code> kernel-cmdline path published as a <code>SimpleFileSystem</code> ESP file with <code>InheritParentDeviceHandle</code> — the other three arches still use the <code>LoadFile2</code> protocol the kernel prefers."
  ]

  meshCaption = "<strong>One ISO, four architectures, ten OS families — plus pure-Go Phase 2.</strong> The same <code>cloud-boot.iso</code> ships <code>BOOTX64.EFI</code> + <code>BOOTAA64.EFI</code> + <code>BOOTRISCV64.EFI</code> + <code>BOOTLOONGARCH64.EFI</code> ; spheres are boot envelopes landing on each (arch, OS) target. The Phase 2 TamaGo loader follows the same multi-arch shape and as of 2026-06-10 reaches a real Debian 13 userspace end-to-end on all four arches in 16-18 s wall-clock from a cold DHCP lease (R-amd64j closure). M9.0+M9.1+M9.2 shipped an interactive boot menu ; the nightly cron re-publishes a fresh <code>vmlinuz</code> for each arch."

