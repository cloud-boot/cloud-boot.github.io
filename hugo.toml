# No theme — layouts live in ./layouts

disableKinds = ['taxonomy', 'term', 'rss', 'sitemap']

[params]
  description = "cloud-boot is a UKI toolchain, a TinyGo UEFI loader, and a pure-Go TamaGo bare-metal UEFI loader that boots unmodified Linux, FreeBSD, NetBSD, OpenBSD cloud images (and Windows via DevicePath handoff) on KVM/QEMU, Apple Virtualization.framework, and OpenStack — across amd64, arm64, riscv64, and loongarch64."
  brand       = "cloud-boot"
  github      = "cloud-boot"
  heroAccent  = "cloud-boot"
  heroTagline = "From firmware entry to distro userspace — pure Go, four arches, one ISO."

  heroIntro = [
    "<strong>cloud-boot</strong> boots an unmodified cloud image on any UEFI hypervisor. Three complementary tracks coexist : <em>Phase 1</em> ships a UKI toolchain plus three boot paths (<em>kexec</em>, <em>UKI menu-then-reboot</em>, <em>pure-UEFI TinyGo loader</em>) that all land on the same stock OS userspace ; <em>Phase 2</em> is a pure-Go TamaGo bare-metal UEFI loader that walks PCI, drives virtio-net, speaks DHCPv4 / DNS / TLS / HTTPS / OCI v2, verifies cosign signatures, and chain-boots the distro kernel — entirely inside Boot Services, no cgo, no external linker ; <em>Phase 3</em> generalises Phase 2 into an OS-agnostic OCI boot architecture — same loader, but it publishes its own <code>EFI_BLOCK_IO_PROTOCOL</code> + <code>EFI_SIMPLE_FILE_SYSTEM_PROTOCOL</code> (Go-side) over an in-memory UFS2 / FAT / NTFS image and chain-boots the target OS's native first-stage loader (<code>loader.efi</code> / <code>boot.efi</code> / <code>bootmgfw.efi</code>).",
    "One multi-arch hybrid ISO embeds <code>BOOTX64.EFI</code> + <code>BOOTAA64.EFI</code> + <code>BOOTRISCV64.EFI</code> + <code>BOOTLOONGARCH64.EFI</code> ; firmware on each CPU reads only its own arch's file. <strong>Phase 2 reaches a real Debian 13 userspace on all four arches</strong> from a fresh DHCP lease against a public OCI registry — arm64 <strong>17.1 s</strong>, amd64 <strong>16.1 s</strong>, riscv64 <strong>18.1 s</strong>, loong64 <strong>17.1 s</strong> wall-clock (Debian 6.12.90 across the first three, 7.0.12 on loong64). <code>M8.15</code> subsequently unified all four arches on the <code>initrd=</code> path and <code>M8.16</code> deleted ~1684 LOC of dead <code>LoadFile2</code> publish code. <strong>Phase 3 is live for OpenBSD</strong> end-to-end (<code>boot&gt;</code> prompt, amd64, 2026-06-11) ; FreeBSD reaches <code>currdev</code> selection against our UFS but OOMs at kernel-load (sprint 2E pending) ; NetBSD and Windows scaffolding ships behind their own gates (ISO size, NTFS reader)."
  ]

  meshCaption = "<strong>One ISO, four architectures, OS-agnostic chain-boot.</strong> The same <code>cloud-boot.iso</code> ships <code>BOOTX64.EFI</code> + <code>BOOTAA64.EFI</code> + <code>BOOTRISCV64.EFI</code> + <code>BOOTLOONGARCH64.EFI</code> ; spheres are boot envelopes landing on each (arch, OS) target. Phase 2 reaches a real Debian 13 userspace end-to-end on all four arches in 16-18 s wall-clock from a cold DHCP lease ; <code>M8.15</code>+<code>M8.16</code> consolidated the path and pruned legacy code. Phase 3 generalises the loader to OpenBSD (<strong>live</strong>), FreeBSD (<em>currdev</em>, OOM at kernel-load), NetBSD (<em>scaffolded</em>), and Windows (<em>scaffolded</em>) via a pure-Go <code>BlockIO</code> + <code>SFS</code> publish pair on top of an in-memory UFS2 image — built with the new <a href='https://github.com/go-filesystems/ufs'><code>go-filesystems/ufs</code></a> read+write driver. <code>M9.0</code>+<code>M9.1</code>+<code>M9.2</code> shipped an interactive boot menu ; the nightly cron re-publishes a fresh <code>vmlinuz</code> for each arch."

